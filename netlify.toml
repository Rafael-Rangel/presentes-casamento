# Next.js na Netlify: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview
[build]
  command = "npm run build"

# Garante metadataBase, magic link e links de convite em produção (ajusta se mudares de domínio).
[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://casamento-rafael-adrielly.netlify.app"

# Função agendada (cron) — chama a rota Next com CRON_SECRET (igual à lógica antiga na Vercel).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."expire-reservations"]
  schedule = "@hourly"
